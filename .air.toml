root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/api/main.go"
  entrypoint = "./tmp/main.exe"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  delay = 1000
  env = ["APP_ENV=development"]

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
